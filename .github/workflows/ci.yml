name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov black isort

    # 在运行测试前确保 output 目录是空的
    - name: Clean Output Directory
      run: rm -rf output/* && mkdir -p output/results output/visualizations output/models

    - name: Lint and Format Check
      run: |
        black --check src/ run_analysis.py
        isort --check-only src/ run_analysis.py

    - name: Run tests with pytest
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v --cov=src --cov-report=xml

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  performance-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # 修正了脚本路径：从 tests/ 运行
    - name: Run performance test
      run: |
        python tests/performance_test.py --data-path data/customer_churn_data.xlsx

  build-and-test-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 1. 修正了 Dockerfile 路径 (-f docker/Dockerfile)
    # 2. 通过 .dockerignore 忽略 output 文件夹（见下方建议）
    - name: Build Docker image
      run: |
        docker build -t customer-churn-analysis:latest -f docker/Dockerfile .

    # 验证镜像是否能正常运行（不生成可视化以加快速度）
    - name: Test Docker image run
      run: |
        docker run --rm -v $(pwd)/data:/app/data customer-churn-analysis:latest \
          python run_analysis.py --data-path /app/data/customer_churn_data.xlsx